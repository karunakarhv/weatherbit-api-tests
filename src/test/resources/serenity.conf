serenity {
  # Project name shown in report header
  project.name = "Qantas Loyalty - Weather API Tests"

  # Where Serenity writes its JSON outcome files before aggregation
  outputDirectory = "target/site/serenity"

  # Show full stack traces in the report for failed steps
  report.show.step.details = true

  # Retry logic: retry a failing test once before marking it as failed
  # Helps with transient network flakiness against the live API
  test.retry.count = 1

  # REST logging level: BODY logs the full request+response body in each step
  rest.logLevel = "BODY"
}

# Weatherbit base URL — can be overridden with -Dweatherbit.base.url=...
weatherbit {
  base.url = "https://api.weatherbit.io/v2.0"
  # api.key is injected at runtime via -Dapi.key=YOUR_KEY
  # or set the environment variable WEATHERBIT_API_KEY
}
